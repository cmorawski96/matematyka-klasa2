<!DOCTYPE html>
<html lang="pl">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Matematyka klasa 2</title>

  <style>
    <style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f0f8ff;
  }

  header {
    background-color: #4CAF50;
    color: white;
    text-align: center;
    padding: 20px;
  }

  header h1 {
    margin: 0;
    font-size: 24px;
  }

  nav {
    display: flex;
    justify-content: center;
    background: #ffffff;
    padding: 10px;
    gap: 10px;
    flex-wrap: wrap;
  }

  nav button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background-color: #2196F3;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }

  .container {
    padding: 15px;
    max-width: 900px;
    margin: auto;
  }

  .section {
    display: none;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .active {
    display: block;
  }

  .task {
    background: #e3f2fd;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    font-size: 18px;
  }

  input {
    padding: 5px;
    font-size: 16px;
    width: 60px;
  }

  button {
    margin-left: 5px;
  }

  .button {
    display: inline-block;
    padding: 10px 15px;
    background-color: #ff9800;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-top: 10px;
  }

  /* 📱 TELEFONY */
  @media (max-width: 600px) {
    header h1 {
      font-size: 20px;
    }

    nav button {
      font-size: 18px;
      padding: 12px;
      flex: 1 1 100%;
    }

    .container {
      padding: 10px;
    }

    .task {
      font-size: clamp(16px, 2.5vw, 22px);
    }

    input {
      font-size: 18px;
      width: 70px;
    }
  }

  /* 💻 DUŻE EKRANY */
  @media (min-width: 1000px) {
    .container {
      max-width: 700px;
    }

    header h1 {
      font-size: 28px;
    }

    .task {
      font-size: 16px;
    }
  }
</style>
  </style>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }
    function checkAnswer() {
  let answer = document.getElementById("q1").value;
  let result = document.getElementById("result1");

  if(answer == "5") {
    result.innerHTML = " ✅ Dobrze!";
    result.style.color = "green";
  } else {
    result.innerHTML = " ❌ Spróbuj jeszcze raz";
    result.style.color = "red";
  }
}
  </script>

</head>
<body>

<header>
  <h1>📘 Matematyka – klasa 2</h1>
  <p>Uczymy się przez zabawę 😊</p>
</header>

<nav>
  <button onclick="showSection('dodawanie')">➕ Dodawanie</button>
  <button onclick="showSection('odejmowanie')">➖ Odejmowanie</button>
  <button onclick="showSection('materialy')">📄 Materiały</button>
</nav>

<div class="container">

  <div id="dodawanie" class="section active">
    <h2>➕ Dodawanie</h2>
    <<div class="task">
  2 + 3 = 
  <input type="number" id="q1">
  <button onclick="checkAnswer()">Sprawdź</button>
  <span id="result1"></span>
</div>
    <div class="task">4 + 5 = ?</div>
    <div class="task">10 + 2 = ?</div>
  </div>

  <div id="odejmowanie" class="section">
    <h2>➖ Odejmowanie</h2>
    <div class="task">5 - 2 = ?</div>
    <div class="task">9 - 3 = ?</div>
    <div class="task">8 - 4 = ?</div>
  </div>

  <div id="materialy" class="section">
    <h2>📄 Materiały</h2>
    <a href="#" class="button">Karta pracy 1</a><br>
    <a href="#" class="button">Karta pracy 2</a>
  </div>

</div>

</body>
</html>
