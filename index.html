<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Matematyka klasa 2</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      padding: 20px;
    }

    h2 {
      color: #333;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }

    .box {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    a.button {
      display: inline-block;
      padding: 10px 15px;
      background-color: #ff9800;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
    }

    a.button:hover {
      background-color: #e68900;
    }
  </style>

</head>
<body>

<header>
  <h1>📘 Matematyka – klasa 2</h1>
  <p>Uczymy się przez zabawę 😊</p>
</header>

<div class="container">

  <div class="box">
    <h2>➕ Dodawanie</h2>
    <p>2 + 3 = 5</p>
  </div>

  <div class="box">
    <h2>➖ Odejmowanie</h2>
    <p>5 - 2 = 3</p>
  </div>

  <div class="box">
    <h2>📄 Materiały</h2>
    <a href="#" class="button">Karta pracy 1</a>
    <br>
    <a href="#" class="button">Karta pracy 2</a>
  </div>

</div>

</body>
</html>
