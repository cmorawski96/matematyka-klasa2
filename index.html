<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Matematyka klasa 2</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f0f8ff;
    }

    header {
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 20px;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #ffffff;
      padding: 10px;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background-color: #2196F3;
      color: white;
      cursor: pointer;
    }

    nav button:hover {
      background-color: #1976D2;
    }

    .container {
      padding: 20px;
    }

    .section {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .active {
      display: block;
    }

    .task {
      background: #e3f2fd;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    .button {
      display: inline-block;
      padding: 10px 15px;
      background-color: #ff9800;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }
    function checkAnswer() {
  let answer = document.getElementById("q1").value;
  let result = document.getElementById("result1");

  if(answer == "5") {
    result.innerHTML = " ✅ Dobrze!";
    result.style.color = "green";
  } else {
    result.innerHTML = " ❌ Spróbuj jeszcze raz";
    result.style.color = "red";
  }
}
  </script>

</head>
<body>

<header>
  <h1>📘 Matematyka – klasa 2</h1>
  <p>Uczymy się przez zabawę 😊</p>
</header>

<nav>
  <button onclick="showSection('dodawanie')">➕ Dodawanie</button>
  <button onclick="showSection('odejmowanie')">➖ Odejmowanie</button>
  <button onclick="showSection('materialy')">📄 Materiały</button>
</nav>

<div class="container">

  <div id="dodawanie" class="section active">
    <h2>➕ Dodawanie</h2>
    <<div class="task">
  2 + 3 = 
  <input type="number" id="q1">
  <button onclick="checkAnswer()">Sprawdź</button>
  <span id="result1"></span>
</div>
    <div class="task">4 + 5 = ?</div>
    <div class="task">10 + 2 = ?</div>
  </div>

  <div id="odejmowanie" class="section">
    <h2>➖ Odejmowanie</h2>
    <div class="task">5 - 2 = ?</div>
    <div class="task">9 - 3 = ?</div>
    <div class="task">8 - 4 = ?</div>
  </div>

  <div id="materialy" class="section">
    <h2>📄 Materiały</h2>
    <a href="#" class="button">Karta pracy 1</a><br>
    <a href="#" class="button">Karta pracy 2</a>
  </div>

</div>

</body>
</html>
